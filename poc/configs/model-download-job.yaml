apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: model-storage
  namespace: eval-poc
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 30Gi
---
apiVersion: batch/v1
kind: Job
metadata:
  name: download-qwen-7b
  namespace: eval-poc
spec:
  backoffLimit: 3
  template:
    spec:
      restartPolicy: OnFailure
      containers:
        - name: downloader
          image: registry.access.redhat.com/ubi9/python-311:latest
          command:
            - /bin/bash
            - -c
            - |
              pip install -q huggingface_hub 2>/dev/null
              echo "Starting download of Qwen2.5-Coder-7B-Instruct..."
              python3 -c "
              from huggingface_hub import snapshot_download
              snapshot_download(
                  'Qwen/Qwen2.5-Coder-7B-Instruct',
                  local_dir='/models/Qwen2.5-Coder-7B-Instruct',
                  local_dir_use_symlinks=False,
                  ignore_patterns=['*.gguf', '*.md', 'LICENSE*'],
              )
              print('Download complete!')
              "
          volumeMounts:
            - name: models
              mountPath: /models
          resources:
            requests:
              cpu: "2"
              memory: "4Gi"
            limits:
              cpu: "4"
              memory: "8Gi"
      volumes:
        - name: models
          persistentVolumeClaim:
            claimName: model-storage
