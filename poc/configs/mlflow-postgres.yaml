apiVersion: apps/v1
kind: Deployment
metadata:
  name: mlflow-postgres
  namespace: eval-poc
spec:
  replicas: 1
  selector:
    matchLabels:
      app: mlflow-postgres
  template:
    metadata:
      labels:
        app: mlflow-postgres
    spec:
      containers:
        - name: postgres
          image: registry.redhat.io/rhel9/postgresql-16:latest
          ports:
            - containerPort: 5432
          env:
            - name: POSTGRESQL_USER
              value: mlflow
            - name: POSTGRESQL_PASSWORD
              value: mlflow
            - name: POSTGRESQL_DATABASE
              value: mlflow
          volumeMounts:
            - name: pgdata
              mountPath: /var/lib/pgsql/data
          resources:
            requests:
              cpu: 250m
              memory: 256Mi
            limits:
              cpu: 500m
              memory: 512Mi
      volumes:
        - name: pgdata
          persistentVolumeClaim:
            claimName: mlflow-pgdata
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: mlflow-pgdata
  namespace: eval-poc
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 5Gi
---
apiVersion: v1
kind: Service
metadata:
  name: mlflow-postgres
  namespace: eval-poc
spec:
  selector:
    app: mlflow-postgres
  ports:
    - port: 5432
      targetPort: 5432
---
apiVersion: v1
kind: Secret
metadata:
  name: mlflow-db-credentials
  namespace: eval-poc
type: Opaque
stringData:
  MLFLOW_BACKEND_STORE_URI: "postgresql://mlflow:mlflow@mlflow-postgres.eval-poc.svc:5432/mlflow"
